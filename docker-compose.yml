services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.example
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_started
      minio:
        condition: service_healthy

  worker-normalize:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/worker-normalize"]
    env_file:
      - .env.example
    depends_on:
      nats:
        condition: service_started
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-event-writer:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/worker-event-writer"]
    env_file:
      - .env.example
    depends_on:
      nats:
        condition: service_started
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-grouping:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/worker-grouping"]
    env_file:
      - .env.example
    depends_on:
      nats:
        condition: service_started
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-alert:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/worker-alert"]
    env_file:
      - .env.example
    depends_on:
      nats:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-outcome:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/worker-outcome"]
    env_file:
      - .env.example
    depends_on:
      nats:
        condition: service_started
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-session:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/worker-session"]
    env_file:
      - .env.example
    depends_on:
      nats:
        condition: service_started
      clickhouse:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker-attachment:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint: ["/worker-attachment"]
    env_file:
      - .env.example
    depends_on:
      nats:
        condition: service_started
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sentry
      POSTGRES_PASSWORD: sentry
      POSTGRES_DB: sentry
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentry -d sentry"]
      interval: 5s
      timeout: 3s
      retries: 20

  clickhouse:
    image: clickhouse/clickhouse-server:24.12-alpine
    environment:
      CLICKHOUSE_USER: sentry
      CLICKHOUSE_PASSWORD: sentry
      CLICKHOUSE_DB: sentry
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./migrations/clickhouse:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user sentry --password sentry --query 'SELECT 1'"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-sd", "/data"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - nats-data:/data

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9001:9001"
      - "9002:9000"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres-data:
  clickhouse-data:
  nats-data:
  minio-data:
